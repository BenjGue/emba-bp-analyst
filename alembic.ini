# Configuration Alembic — migrations de schéma versionnées (BIZ-29).
#
# L'URL de connexion n'est PAS définie ici : elle est lue dynamiquement depuis
# la configuration applicative (``app.config.get_settings().database_url``) par
# ``migrations/env.py``, ce qui garantit l'absence de secret en dur et l'usage
# de la même source de vérité que l'application (SQLite en dev, MySQL en prod).

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# ── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
