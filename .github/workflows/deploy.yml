name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write   # OIDC — pas de secret Azure stocké
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false   # ne pas annuler un déploiement en cours

jobs:
  deploy:
    name: Build → ACR → Azure Container Apps
    runs-on: ubuntu-latest
    environment: dev
    env:
      # Mappé depuis le secret d'environnement pour pouvoir tester sa présence
      # dans un `if:` (le contexte `secrets` n'est pas disponible en condition).
      DB_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC — sans secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push vers Azure Container Registry
        run: |
          az acr build \
            --registry acrbizplandev \
            --image bizplan-api:${{ github.sha }} \
            .

      # Persistance MySQL (BIZ-29 / BIZ-41) — réassertion idempotente du secret
      # de connexion. Le secret de la Container App est rafraîchi depuis le
      # secret d'environnement GitHub `DATABASE_URL` (jamais en clair dans le
      # dépôt). L'étape est ignorée si le secret n'est pas configuré, afin de ne
      # pas casser un déploiement ; la variable d'env reste posée ci-dessous tant
      # que le secret applicatif `database-url` existe déjà.
      - name: Assurer le secret DATABASE_URL (idempotent)
        if: ${{ env.DB_URL != '' }}
        run: |
          az containerapp secret set \
            --name bizplan-api-dev \
            --resource-group rg-bizplan-dev \
            --secrets "database-url=$DB_URL"

      - name: Déployer sur Azure Container Apps
        run: |
          az containerapp update \
            --name bizplan-api-dev \
            --resource-group rg-bizplan-dev \
            --image acrbizplandev.azurecr.io/bizplan-api:${{ github.sha }} \
            --set-env-vars "DATABASE_URL=secretref:database-url"

      - name: Vérifier la santé de l'app
        run: |
          sleep 30
          az containerapp show \
            --name bizplan-api-dev \
            --resource-group rg-bizplan-dev \
            --query "properties.runningStatus" \
            --output tsv
