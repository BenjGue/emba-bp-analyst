name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write   # OIDC — pas de secret Azure stocké
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false   # ne pas annuler un déploiement en cours

jobs:
  deploy:
    name: Build → ACR → Azure Container Apps
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Download SSL cert Azure MySQL
        run: |
          curl -sL https://dl.cacerts.digicert.com/DigiCertGlobalRootG2.crt.pem \
            -o DigiCertGlobalRootG2.crt.pem

      - name: Azure login (OIDC — sans secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push vers Azure Container Registry
        run: |
          az acr build \
            --registry bizplanacr \
            --image bizplan-api:${{ github.sha }} \
            .

      - name: Déployer sur Azure Container Apps
        run: |
          az containerapp update \
            --name bizplan-api \
            --resource-group rg-bizplan \
            --image bizplanacr.azurecr.io/bizplan-api:${{ github.sha }}

      - name: Vérifier la santé de l'app
        run: |
          sleep 30
          az containerapp show \
            --name bizplan-api \
            --resource-group rg-bizplan \
            --query "properties.runningStatus" \
            --output tsv
