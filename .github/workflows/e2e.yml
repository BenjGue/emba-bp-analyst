name: E2E

# Déclenché automatiquement après chaque déploiement réussi sur main
# (workflow "Deploy" terminé), conformément à la règle BIZ-39.
# Exécutable aussi manuellement pour relancer la suite à la demande.
on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-main
  cancel-in-progress: false

jobs:
  playwright:
    name: Suite E2E Playwright
    runs-on: ubuntu-latest
    # Ne s'exécute que si le déploiement a réussi (ou lancement manuel).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}

    defaults:
      run:
        working-directory: e2e

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        run: npm ci || npm install

      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps chromium

      - name: Exécuter la suite E2E
        id: e2e
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
        run: npx playwright test

      - name: Publier les artefacts Playwright
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
            e2e/results.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Créer les tickets JIRA bug + correctif sur échec
        if: ${{ failure() && steps.e2e.outcome == 'failure' }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: BIZ
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULTS_PATH: results.json
        run: node scripts/report-failures.js
