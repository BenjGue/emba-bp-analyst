name: Keep MySQL awake

# Le serveur Azure Database for MySQL Flexible (tier Burstable) s'arrête
# automatiquement après ~7 jours d'inactivité. Un arrêt provoque l'échec au
# démarrage du backend et l'indisponibilité du site (BIZ-49). Ce workflow le
# réveille quotidiennement s'il est arrêté.

on:
  schedule:
    - cron: "0 5 * * *" # tous les jours à 05:00 UTC
  workflow_dispatch: {}

permissions:
  id-token: write # OIDC — pas de secret Azure stocké
  contents: read

concurrency:
  group: keep-mysql-awake
  cancel-in-progress: false

jobs:
  keep-awake:
    name: Réveiller le serveur MySQL si arrêté
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC — sans secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Démarrer le serveur MySQL s'il est arrêté
        run: |
          set -euo pipefail
          state=$(az mysql flexible-server show \
            --name bizplan-mysql-dev \
            --resource-group rg-bizplan-dev \
            --query state -o tsv)
          echo "État actuel : $state"
          if [ "$state" != "Ready" ]; then
            echo "Serveur non prêt — démarrage en cours…"
            az mysql flexible-server start \
              --name bizplan-mysql-dev \
              --resource-group rg-bizplan-dev
            echo "Serveur démarré."
          else
            echo "Serveur déjà prêt — rien à faire."
          fi
