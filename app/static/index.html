<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BizPlan-IA — La Poste</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23003DA5'/%3E%3Ctext x='50' y='68' font-size='56' text-anchor='middle' fill='%23FFCD00' font-family='sans-serif' font-weight='bold'%3EB%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand" role="button" tabindex="0" data-nav="dashboard">
        <span class="brand-mark">B</span>
        <div>
          <h1>BizPlan-IA</h1>
          <p>Évaluation de la pertinence des projets internes</p>
        </div>
      </div>
      <button class="btn btn-primary" data-nav="wizard">+ Nouveau projet</button>
    </header>

    <main id="view" class="container" aria-live="polite"></main>

    <div id="toast" class="toast" hidden></div>

    <template id="tpl-dashboard">
      <section>
        <div class="section-head">
          <h2>Tableau de bord</h2>
          <label class="filter">
            Direction
            <select id="filter-direction"></select>
          </label>
        </div>
        <div id="dashboard-list"></div>
      </section>
    </template>

    <script src="/static/app.js" defer></script>
  </body>
</html>
